[build]
  cmd = "go build -o ./bin/server ./cmd/server"
  entrypoint = "./bin/server"
  full_bin = "./bin/server"
  include_ext = ["go", "html"]
  exclude_dir = ["bin", "vendor", ".git", "cmd/worker", "cmd/ws"]

[run]
  env_pass = ["TEMPORAL_HOST_URL", "TEMPORAL_NAMESPACE", "PORT"]

[log]
  main_only = false