<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/workflow-app.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div x-data="workflowApp({
        apiEndpoint: '/api/payment/start',
        expectedTotal: false,
        fields: [
            { model: 'orderId', key: 'order_id', label: 'Order ID', placeholder: 'ORD-12345', default: 'ORD-' + Math.random().toString(36).substr(2, 5).toUpperCase() },
            { model: 'amount', key: 'amount', label: 'Amount ($)', placeholder: '100.00', type: 'number', default: 100 },
            { model: 'customerId', key: 'customer_id', label: 'Customer ID', placeholder: 'CUST-001', default: 'CUST-001' }
        ]
    })" class="w-full max-w-lg">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Payment Processing</h1>
            <p class="text-gray-500 text-sm mb-6">Long-running workflow demo with Temporal</p>

            <div x-show="!workflowId" class="space-y-4">
                <template x-for="field in fields" :key="field.model">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" x-text="field.label"></label>
                        <input x-model="field.model" :type="field.type || 'text'" :placeholder="field.placeholder"
                            class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                </template>
                <button @click="startWorkflow()" :disabled="loading"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Start Payment</span>
                    <span x-show="loading">Processing...</span>
                </button>
            </div>

            <div x-show="workflowId" x-transition>
                <div class="mb-4 p-3 bg-gray-50 rounded-lg">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500 uppercase">Workflow ID</span>
                        <button @click="copyWorkflowId()" class="text-xs text-blue-600 hover:text-blue-800">
                            <span x-text="copied ? 'Copied!' : 'Copy'"></span>
                        </button>
                    </div>
                    <p class="font-mono text-sm text-gray-800 truncate" x-text="workflowId"></p>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-600">Progress</span>
                        <span class="font-semibold text-gray-800" x-text="progress + '%'"></span>
                    </div>
                    <div class="h-4 bg-gray-200 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 transition-all duration-500"
                            :style="'width: ' + progress + '%'"></div>
                    </div>
                </div>

                <div class="bg-blue-50 rounded-xl p-6 mb-4">
                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Current Activity</p>
                    <p class="text-lg font-bold text-gray-800" x-text="activity || 'Idle'"></p>
                </div>

                <div x-show="timeline.length > 0" class="mb-6">
                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-3">Activity Timeline</p>
                    <div>
                        <template x-for="span in timeline" :key="span.name">
                            <div class="flex items-center gap-3 mb-2 text-sm">
                                <span class="w-32 text-gray-600 truncate shrink-0" x-text="span.name"></span>
                                <div class="flex-1 relative h-6 bg-gray-100 rounded overflow-hidden">
                                    <div class="absolute h-full rounded transition-all duration-300"
                                        :class="span.status === 'failed' ? 'bg-red-400' : span.status === 'running' ? 'bg-blue-400' : 'bg-green-400'"
                                        :style="timelineBarStyle(span)">
                                    </div>
                                </div>
                                <span class="w-20 text-xs text-gray-500 shrink-0 text-right"
                                    x-text="span.duration_ms ? (span.duration_ms / 1000).toFixed(2) + 's' : '…'"></span>
                            </div>
                        </template>
                    </div>
                    <div class="flex justify-between text-xs text-gray-400 mt-1" style="padding-left: 9.5rem">
                        <span></span>
                        <span x-text="(timelineTotalMs / 1000).toFixed(2) + 's'"></span>
                    </div>
                </div>

                <button @click="reset()" class="w-full border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-50 transition">
                    Start New Payment
                </button>
            </div>

            <div x-show="error" class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                <p class="font-bold">Failed</p>
                <p x-text="error"></p>
            </div>
        </div>
    </div>
</body>
</html>
