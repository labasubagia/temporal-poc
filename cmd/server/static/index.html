<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal Workflows</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/workflow-app.js"></script>
</head>

<body class="bg-gray-50 min-h-screen p-4">
    <script>injectNavbar('/')</script>
    <div class="w-full max-w-lg mx-auto">
        <div class="border border-gray-200 bg-white rounded-lg p-8">
            <h1 class="text-2xl font-medium text-gray-900 mb-2">Temporal Workflows</h1>
            <p class="text-gray-400 text-sm mb-8">Select a workflow to run</p>

            <div class="space-y-3">
                <a href="/payment"
                    class="block w-full py-3 px-4 text-center text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-md transition">
                    Payment Workflow
                </a>
                <a href="/order"
                    class="block w-full py-3 px-4 text-center text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-md transition">
                    Order Workflow
                </a>
                <a href="/ws-purchase"
                    class="block w-full py-3 px-4 text-center text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-md transition">
                    Purchase Order Workflow (WebSocket)
                </a>
                <a href="/failing"
                    class="block w-full py-3 px-4 text-center text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-md transition">
                    Failing Workflow
                </a>
            </div>
        </div>
    </div>
</body>

</html>
