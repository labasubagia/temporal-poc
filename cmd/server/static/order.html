<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Processing</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/workflow-app.js"></script>
</head>

<body class="bg-gray-50 min-h-screen p-4">
    <script>injectNavbar('/order')</script>
    <div class="w-full max-w-lg mx-auto">
        <div x-data="workflowApp({
        apiEndpoint: '/api/order/start',
        expectedTotal: true,
        fields: [
            { model: 'orderId', key: 'order_id', label: 'Order ID', placeholder: 'ORD-12345', default: 'ORD-' + Math.random().toString(36).substr(2, 5).toUpperCase() },
            { model: 'customerId', key: 'customer_id', label: 'Customer ID', placeholder: 'CUST-001', default: 'CUST-001' },
            { model: 'items', key: 'items', label: 'Items (comma-separated)', placeholder: 'Item1, Item2', default: 'Item1, Item2', transform: v => v.split(',').map(i => i.trim()).filter(i => i) }
        ]
    })" class="border border-gray-200 bg-white rounded-lg p-6">
            <h1 class="text-xl font-medium text-gray-900 mb-1">Order Processing</h1>
            <p class="text-gray-400 text-sm mb-6">Long-running workflow demo with Temporal</p>

            <div x-show="!workflowId" class="space-y-4">
                <template x-for="field in fields" :key="field.model">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1" x-text="field.label"></label>
                        <input :value="$data[field.model]" @input="$data[field.model] = $event.target.value" type="text" :placeholder="field.placeholder"
                            class="w-full px-3 py-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-gray-400 transition">
                    </div>
                </template>
                <button @click="startWorkflow()" :disabled="loading"
                    class="w-full py-2.5 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded text-sm transition disabled:opacity-50">
                    <span x-show="!loading">Start Order</span>
                    <span x-show="loading">Processing...</span>
                </button>
            </div>

            <div x-show="workflowId" x-transition>
                <div class="mb-4 p-3 bg-gray-50 rounded">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-400 uppercase">Workflow ID</span>
                        <button @click="copyWorkflowId()" class="text-xs text-gray-500 hover:text-gray-700">
                            <span x-text="copied ? 'Copied!' : 'Copy'"></span>
                        </button>
                    </div>
                    <p class="font-mono text-xs text-gray-600 truncate" x-text="workflowId"></p>
                </div>

                <div class="mb-5">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-500">Progress</span>
                        <span class="text-gray-700" x-text="progress + '%'"></span>
                    </div>
                    <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-gray-400 transition-all duration-500"
                            :style="'width: ' + progress + '%'"></div>
                    </div>
                </div>

                <div class="bg-gray-50 rounded p-4 mb-4">
                    <p class="text-xs text-gray-400 uppercase mb-1">Current Activity</p>
                    <p class="text-gray-800" x-text="activity || 'Idle'"></p>
                </div>

                <div x-show="timeline.length > 0" class="mb-5">
                    <p class="text-xs text-gray-400 uppercase mb-2">Activity Timeline</p>
                    <div>
                        <template x-for="span in timeline" :key="span.name">
                            <div class="flex items-center gap-2 mb-1.5 text-xs">
                                <span class="w-28 text-gray-500 truncate shrink-0" x-text="span.name"></span>
                                <div class="flex-1 relative h-4 bg-gray-100 rounded overflow-hidden">
                                    <div class="absolute h-full rounded transition-all duration-300"
                                        :class="span.status === 'failed' ? 'bg-red-400' : span.status === 'running' ? 'bg-gray-400' : 'bg-green-400'"
                                        :style="timelineBarStyle(span)">
                                    </div>
                                </div>
                                <span class="w-14 text-gray-400 shrink-0 text-right"
                                    x-text="span.duration_ms ? (span.duration_ms / 1000).toFixed(1) + 's' : '…'"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <button @click="reset()"
                    class="w-full py-2 text-gray-500 hover:text-gray-700 border border-gray-200 rounded text-sm transition">
                    Start New Order
                </button>
            </div>

            <div x-show="error" class="mt-4 p-3 bg-red-50 border border-red-100 rounded text-red-600 text-sm">
                <p x-text="error"></p>
            </div>
        </div>
    </div>
</body>

</html>
