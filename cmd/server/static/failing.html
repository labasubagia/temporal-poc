<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failing Workflow</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div x-data="failingApp()" class="w-full max-w-lg">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Failing Workflow</h1>
            <p class="text-gray-500 text-sm mb-6">Simulates a failing long-running process</p>

            <div x-show="!workflowId" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Task ID</label>
                    <input x-model="taskId" type="text" placeholder="TASK-001"
                        class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition">
                </div>
                <button @click="startFailing()" :disabled="loading"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-6 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Start Failing Workflow</span>
                    <span x-show="loading">Processing...</span>
                </button>
            </div>

            <div x-show="workflowId" x-transition>
                <div class="mb-4 p-3 bg-gray-50 rounded-lg">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500 uppercase">Workflow ID</span>
                        <button @click="copyWorkflowId()" class="text-xs text-blue-600 hover:text-blue-800">
                            <span x-text="copied ? 'Copied!' : 'Copy'"></span>
                        </button>
                    </div>
                    <p class="font-mono text-sm text-gray-800 truncate" x-text="workflowId"></p>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-600">Progress</span>
                        <span class="font-semibold text-gray-800" x-text="progress + '%'"></span>
                    </div>
                    <div class="h-4 bg-gray-200 rounded-full overflow-hidden">
                        <div class="h-full transition-all duration-500"
                            :class="error ? 'bg-red-600' : 'bg-blue-600'"
                            :style="'width: ' + progress + '%'"></div>
                    </div>
                </div>

                <div class="bg-blue-50 rounded-xl p-6 mb-4">
                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Current Activity</p>
                    <p class="text-lg font-bold text-gray-800" x-text="activity || 'Idle'"></p>
                </div>

                <div x-show="timeline.length > 0" class="mb-6">
                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-3">Activity Timeline</p>
                    <div>
                        <template x-for="span in timeline" :key="span.name">
                            <div class="flex items-center gap-3 mb-2 text-sm">
                                <span class="w-32 text-gray-600 truncate shrink-0" x-text="span.name"></span>
                                <div class="flex-1 relative h-6 bg-gray-100 rounded overflow-hidden">
                                    <div class="absolute h-full rounded transition-all duration-300"
                                        :class="span.status === 'failed' ? 'bg-red-400' : span.status === 'running' ? 'bg-blue-400' : 'bg-green-400'"
                                        :style="timelineBarStyle(span)">
                                    </div>
                                </div>
                                <span class="w-20 text-xs text-gray-500 shrink-0 text-right"
                                    x-text="span.duration_ms ? (span.duration_ms / 1000).toFixed(2) + 's' : '…'"></span>
                            </div>
                        </template>
                    </div>
                    <div class="flex justify-between text-xs text-gray-400 mt-1" style="padding-left: 9.5rem">
                        <span></span>
                        <span x-text="(timelineTotalMs / 1000).toFixed(2) + 's'"></span>
                    </div>
                </div>

                <div x-show="error" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                    <p class="font-bold">Failed</p>
                    <p x-text="error"></p>
                </div>

                <button @click="reset()" class="w-full border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-50 transition">
                    Start New Workflow
                </button>
            </div>
        </div>
    </div>

    <script>
        function failingApp() {
            return {
                taskId: 'TASK-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
                workflowId: '',
                progress: 0,
                activity: '',
                loading: false,
                error: '',
                copied: false,
                pollInterval: null,
                timeline: [],
                timelineTotalMs: 0,
                timelineStartMs: 0,

                startFailing() {
                    this.loading = true;
                    this.error = '';
                    this.progress = 0;
                    this.timeline = [];

                    fetch('/api/failing/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: this.taskId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        this.workflowId = data.workflow_id;
                        this.loading = false;
                        this.startPolling();
                    })
                    .catch(err => {
                        this.error = 'Failed to start: ' + err.message;
                        this.loading = false;
                    });
                },

                startPolling() {
                    this.pollInterval = setInterval(() => this.poll(), 1000);
                },

                poll() {
                    fetch(`/api/workflow/timeline?workflow_id=${this.workflowId}&expected_total=true`)
                        .then(r => r.json())
                        .then(tl => {
                            console.log('Timeline:', tl);
                            if (tl.activities) {
                                this.timeline = tl.activities;
                                this.timelineStartMs = tl.started_at_ms || 0;
                                this.timelineTotalMs = (tl.ended_at_ms || Date.now()) - this.timelineStartMs;
                                
                                const failed = tl.activities.find(a => a.status === 'failed');
                                if (failed) {
                                    const completed = tl.activities.filter(a => a.status === 'completed').length;
                                    this.progress = tl.total_activities > 0 
                                        ? Math.round((completed / tl.total_activities) * 100) 
                                        : 0;
                                    this.error = 'Failed at: ' + failed.name;
                                    this.activity = failed.name;
                                    this.stopPolling();
                                    return;
                                }
                                
                                const last = tl.activities[tl.activities.length - 1];
                                if (last) this.activity = last.name;
                            }
                            this.progress = tl.progress || 0;
                            if (tl.ended_at_ms && this.progress >= 100) {
                                this.progress = 100;
                                this.activity = 'Complete';
                                this.stopPolling();
                            }
                        })
                        .catch(err => console.error('Poll error:', err));
                },

                stopPolling() {
                    if (this.pollInterval) {
                        clearInterval(this.pollInterval);
                        this.pollInterval = null;
                    }
                },

                timelineBarStyle(span) {
                    if (!this.timelineStartMs || !this.timelineTotalMs) return 'left:0;width:100%';
                    const left = ((span.started_at_ms - this.timelineStartMs) / this.timelineTotalMs) * 100;
                    let width;
                    if (span.ended_at_ms) {
                        width = ((span.ended_at_ms - span.started_at_ms) / this.timelineTotalMs) * 100;
                    } else {
                        width = ((Date.now() - span.started_at_ms) / this.timelineTotalMs) * 100;
                    }
                    return `left:${Math.max(0, left).toFixed(1)}%;width:${Math.min(100 - left, width).toFixed(1)}%`;
                },

                copyWorkflowId() {
                    navigator.clipboard.writeText(this.workflowId);
                    this.copied = true;
                    setTimeout(() => this.copied = false, 2000);
                },

                reset() {
                    this.workflowId = '';
                    this.progress = 0;
                    this.activity = '';
                    this.timeline = [];
                    this.error = '';
                    this.stopPolling();
                }
            }
        }
    </script>
</body>
</html>
